# =============================================================================
# Data Contract — sensors-alerts v1
# =============================================================================

contract:

  # ── Metadata ───────────────────────────────────────────────────────────────
  name: sensors-alerts
  version: 1
  status: active

  kafka_topic: "bronze.sensors.alerts"
  format: json

  owner: iot-team@company.com

  consumers:
    - analytics-team
    - ml-team

  max_latency_seconds: 60

  description: >
    Real-time sensor alert events from IoT devices.

  # ── Lakehouse Targets ──────────────────────────────────────────────────────

  iceberg_table: "nessie.bronze.sensors.alerts"
  quarantine_table: nessie.bronze.sensors.alerts_quarantine"

  checkpoint_path: s3a://warehouse/checkpoints/sensors-alerts

  partitioning:
    - days(event_time)

  # ── Governance ─────────────────────────────────────────────────────────────

  tags:
    - iot
    - telemetry
    - realtime

  schema_evolution:
    mode: add_only

  # ── Schema ─────────────────────────────────────────────────────────────────

  fields:

    - name: sensor_id
      type: string
      nullable: false
      description: Unique sensor identifier
      checks:
        - type: not_empty
        - type: regex
          pattern: "^[A-Za-z0-9_-]{3,64}$"

    - name: sensor_type
      type: string
      nullable: false
      checks:
        - type: allowed_values
          values:
            - temperature
            - pressure
            - humidity
            - vibration
            - current

    - name: location
      type: string
      nullable: true

    - name: metric_name
      type: string
      nullable: false
      checks:
        - type: not_empty

    - name: metric_value
      type: double
      nullable: false
      checks:
        - type: range
          min: -9999
          max: 9999

        - type: range_by_field
          field: sensor_type
          ranges:
            temperature: [-50, 150]
            pressure: [0, 1200]
            humidity: [0, 100]
            vibration: [0, 50]
            current: [0, 500]

    - name: unit
      type: string
      nullable: true

    - name: alert_level
      type: string
      nullable: false
      checks:
        - type: allowed_values
          values:
            - INFO
            - WARNING
            - CRITICAL

    - name: alert_message
      type: string
      nullable: true

    - name: event_time
      type: timestamp
      nullable: false
      checks:
        - type: not_future
          tolerance_seconds: 300