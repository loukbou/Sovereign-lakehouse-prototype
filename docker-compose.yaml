services:

  nessie:
    image: ghcr.io/projectnessie/nessie:0.107.9
    container_name: nessie
    hostname: nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: "19120"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka1
    hostname: kafka1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka1
      - apicurio
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: ${SCHEMA_REGISTRY_URL}

  postgres:
    image: postgres:16
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_DB: apicurio
      POSTGRES_USER: apicurio
      POSTGRES_PASSWORD: apicurio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apicurio -d apicurio"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  apicurio:
    image: apicurio/apicurio-registry:3.0.13
    container_name: apicurio
    ports:
      - "8080:8080"
    environment:
      APICURIO_STORAGE_KIND: sql
      APICURIO_STORAGE_SQL_KIND: postgresql
      APICURIO_DATASOURCE_URL: jdbc:postgresql://postgres:5432/apicurio
      APICURIO_DATASOURCE_USERNAME: apicurio
      APICURIO_DATASOURCE_PASSWORD: apicurio
      APICURIO_REST_DELETION_ARTIFACT_ENABLED: "true"
      APICURIO_REST_DELETION_ARTIFACTVERSION_ENABLED: "true"
      APICURIO_REST_DELETION_GROUP_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/apis/registry/v3/system/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  spark-master:
    build:
      context: .
      dockerfile: docker/spark-iceberg/Dockerfile
    container_name: spark-master
    depends_on:
      nessie:
        condition: service_healthy
    ports:
      - "8082:8080"
      - "7077:7077"
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data_contracts:/opt/data_contracts
    environment:
      AWS_REGION: lakehouse-zg
      AWS_ACCESS_KEY_ID: lakehouse
      AWS_SECRET_ACCESS_KEY: lakehouse123

  spark-worker-1:
    build:
      context: .
      dockerfile: docker/spark-iceberg/Dockerfile
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    volumes:
      - ./spark_jobs:/opt/spark_jobs
      - ./data_contracts:/opt/data_contracts
    environment:
      AWS_REGION: lakehouse-zg
      AWS_ACCESS_KEY_ID: lakehouse
      AWS_SECRET_ACCESS_KEY: lakehouse123

  sensors-alerts-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: sensors-alerts-producer
    environment:
      PRODUCER_CONFIG: configs/sensors_alerts.yml
    volumes:
      - ./producers/configs:/app/configs
      - ./schemas:/app/schemas
    depends_on:
      apicurio:
        condition: service_healthy
      kafka1:
        condition: service_started

  sales-transactions-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: sales-transactions-producer
    environment:
      PRODUCER_CONFIG: configs/sales_transactions.yml
    volumes:
      - ./producers/configs:/app/configs
      - ./schemas:/app/schemas
    depends_on:
      apicurio:
        condition: service_healthy
      kafka1:
        condition: service_started
    restart: unless-stopped

networks:
  lakehouse-net:
    driver: bridge