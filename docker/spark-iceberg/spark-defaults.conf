spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

spark.sql.defaultCatalog=nessie

spark.sql.catalog.nessie=org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl=org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri=http://nessie:19120/api/v2
spark.sql.catalog.nessie.warehouse=s3a://warehouse/
spark.sql.catalog.nessie.io-impl=org.apache.iceberg.aws.s3.S3FileIO

spark.sql.catalog.nessie.s3.endpoint=http://192.168.122.246:80
spark.sql.catalog.nessie.s3.path-style-access=true
spark.sql.catalog.nessie.s3.access-key-id=lakehouse
spark.sql.catalog.nessie.s3.secret-access-key=lakehouse123

spark.sql.catalog.nessie.s3.region=lakehouse-zg

spark.hadoop.fs.s3a.endpoint=http://192.168.122.246:80
spark.hadoop.fs.s3a.access.key=lakehouse
spark.hadoop.fs.s3a.secret.key=lakehouse123
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.connection.ssl.enabled=false
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem

spark.driver.extraJavaOptions=-Daws.region=lakehouse-zg
spark.executor.extraJavaOptions=-Daws.region=lakehouse-zg